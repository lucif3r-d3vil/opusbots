<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>opusbots // login</title>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #111318;
    --line: #23262e;
    --text: #d7dae0;
    --muted: #63697a;
    --accent: #5eead4;
    --error: #f47174;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  .card {
    width: 300px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.75rem;
    background: var(--panel);
  }
  .brand {
    font-size: 1rem;
    letter-spacing: .15em;
    color: var(--text);
    margin-bottom: .15rem;
  }
  .brand::after {
    content: "_";
    color: var(--accent);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .tagline { font-size: .72rem; color: var(--muted); margin-bottom: 1.5rem; }
  label {
    display: block; font-size: .68rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); margin-bottom: .3rem;
  }
  input {
    width: 100%; padding: .5rem .1rem; margin-bottom: 1.1rem;
    background: transparent; color: var(--text);
    border: none; border-bottom: 1px solid var(--line);
    font-family: inherit; font-size: .9rem; outline: none;
  }
  input:focus { border-bottom-color: var(--accent); }
  button {
    width: 100%; padding: .55rem; margin-top: .2rem;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 3px;
    font-family: inherit; font-size: .82rem; letter-spacing: .05em;
    cursor: pointer;
  }
  button:hover { background: var(--accent); color: #0c0d10; }
  .flash {
    font-size: .75rem; padding: .5rem .6rem; margin-bottom: 1rem;
    border-left: 2px solid var(--error); color: var(--error);
    background: rgba(244, 113, 116, .08);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">opusbots</div>
    <div class="tagline">homelab bot control</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label for="username">user</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      <label for="password">pass</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">sign in</button>
    </form>
  </div>
</body>
</html>
